version: "2"

# Default linters (errcheck, govet, ineffassign, staticcheck, unused) stay on.
# errorlint and gosec add correctness/security coverage. revive is intentionally
# omitted: its default ruleset is mostly style pedantry already covered by
# staticcheck/govet here.
linters:
  enable:
    - errorlint
    - gosec
  exclusions:
    rules:
      # gosec integer-overflow/audit findings in test fixtures are noise.
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
